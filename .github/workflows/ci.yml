name: CI — Test & SonarCloud Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-analyze:
    name: Jest Tests + SonarCloud
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 4. Run Jest + coverage (FIXED)
      - name: Run Jest with coverage
        run: |
          npx jest \
          --coverage \
          --coverageReporters=html \
          --coverageReporters=lcov \
          --coverageReporters=text-summary \
          --watchAll=false \
          --passWithNoTests
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          EXPO_PUBLIC_SUPABASE_KEY: placeholder_key

      # 5. Upload HTML report (FIXED)
      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: coverage/lcov-report
          retention-days: 7

      # 6. Upload raw lcov (optional, giữ lại cho debug)
      - name: Upload lcov file
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lcov-file
          path: coverage/lcov.info
          retention-days: 7

      # 7. Install Sonar Scanner
      - name: Install SonarQube Scanner
        run: npm install -g sonarqube-scanner

      # 8. SonarCloud Scan
      - name: SonarCloud Scan
        run: sonar-scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
